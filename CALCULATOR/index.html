<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Modern Calculator</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#2c1810,#5d4037,#8d6e63);
}

.calculator{
background:#1e1e1e;
padding:25px;
border-radius:25px;
box-shadow:0 15px 40px rgba(0,0,0,0.4);
width:350px;
}

.display{
width:100%;
height:80px;
border:none;
outline:none;
border-radius:15px;
background:#2b2b2b;
color:white;
font-size:32px;
text-align:right;
padding:20px;
margin-bottom:20px;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:12px;
}

button{
height:65px;
border:none;
border-radius:15px;
font-size:22px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

.number{
background:#424242;
color:white;
}

.operator{
background:#8d6e63;
color:white;
}

.equal{
background:#6d4c41;
color:white;
grid-column:span 2;
}

.clear{
background:#a1887f;
color:white;
}

</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" class="display" readonly>

<div class="buttons">

<button class="clear" onclick="clearDisplay()">C</button>
<button class="operator" onclick="appendValue('/')">÷</button>
<button class="operator" onclick="appendValue('*')">×</button>
<button class="operator" onclick="appendValue('-')">−</button>

<button class="number" onclick="appendValue('7')">7</button>
<button class="number" onclick="appendValue('8')">8</button>
<button class="number" onclick="appendValue('9')">9</button>
<button class="operator" onclick="appendValue('+')">+</button>

<button class="number" onclick="appendValue('4')">4</button>
<button class="number" onclick="appendValue('5')">5</button>
<button class="number" onclick="appendValue('6')">6</button>
<button class="operator" onclick="appendValue('%')">%</button>

<button class="number" onclick="appendValue('1')">1</button>
<button class="number" onclick="appendValue('2')">2</button>
<button class="number" onclick="appendValue('3')">3</button>
<button class="operator" onclick="deleteLast()">⌫</button>

<button class="number" onclick="appendValue('0')">0</button>
<button class="number" onclick="appendValue('.')">.</button>
<button class="equal" onclick="calculate()">=</button>

</div>

</div>

<script>

const display = document.getElementById("display");

function appendValue(value){
display.value += value;
}

function clearDisplay(){
display.value = "";
}

function deleteLast(){
display.value = display.value.slice(0,-1);
}

function calculate(){

try{
display.value = eval(display.value);
}
catch{
display.value = "Error";
}

}

</script>

</body>
</html>
